"$schema" = 'https://starship.rs/config-schema.json'

format = """
[î‚¶](env_bg)\
$os\
$shell\
$time\
(\
[î‚°](fg:prev_bg bg:id_bg)\
$username\
$hostname\
)\
[î‚°](fg:prev_bg bg:dir_bg)\
$directory\
(\
[î‚°](fg:prev_bg bg:git_bg)\
$git_branch\
$git_status\
$git_state\
)\
[î‚°](fg:prev_bg bg:env_bg)\
[ \
${custom.vi_mode_bash}\
${env_var.VI_MODE_PROMPT}\
](bg:env_bg fg:light_fg)\
[î‚´ ](prev_bg)"""

add_newline = false

palette = 'default'

[env_var.VI_MODE_PROMPT]
default = ''
format = '$env_value'

[custom.vi_mode_bash]
command = 'echo "\q{blerc/vim-mode}"'
format = '$output'
ignore_timeout = true                    # PowerShell is slow to test
os = 'unix'
unsafe_no_escape = true                  # Required for the escape sequence
when = 'test "$STARSHIP_SHELL" = "bash"' # This needs to work in PowerShell

[os]
disabled = false
style = "bg:env_bg fg:light_fg"

[os.symbols]
Alpine = "ïŒ€"
Amazon = "ï‰°"
Android = "îœژ"
Arch = "َ°£‡"
Artix = "َ°£‡"
CentOS = "ïŒ„"
Debian = "َ°£ڑ"
Fedora = "َ°£›"
Gentoo = "َ°£¨"
Linux = "َ°Œ½"
Macos = "َ°€µ"
Manjaro = "ïŒ’"
Mint = "َ°£­"
Raspbian = "َ°گ؟"
RedHatEnterprise = "َ±„›"
Redhat = "َ±„›"
SUSE = "ïŒ”"
Ubuntu = "َ°•ˆ"
Windows = "îœڈ"

[shell]
bash_indicator = "bash"
cmd_indicator = "cmd"
disabled = false
format = "[ $indicator ]($style)"
powershell_indicator = "posh"
pwsh_indicator = "pwsh"
style = "bg:env_bg fg:light_fg"

[username]
format = '[ $user]($style)'
show_always = false
style_root = "bg:id_bg fg:light_fg"
style_user = "bg:id_bg fg:light_fg"

[hostname]
format = "[ $hostname ]($style)"
style = "bg:id_bg fg:light_fg"

[directory]
before_repo_root_style = "bold"
format = "[ $path ]($style)"
repo_root_format = "[ \uF408 $repo_root$path [$read_only]($read_only_style)]($style)"
repo_root_style = "bold"
style = "bg:dir_bg fg:dark_fg"
truncation_length = 5
truncation_symbol = '.../'

[directory.substitutions]
"Developer" = "َ°²‹ "
"Documents" = "َ°ˆ™ "
"Downloads" = "ï€™ "
"Music" = "َ°‌ڑ "
"Pictures" = "ï€¾ "

[git_branch]
format = '[ $symbol $branch ]($style)'
style = "bg:git_bg fg:light_fg"
symbol = "ïگک"

[git_status]
ahead = "â‡،${count}"
behind = "â‡£${count}"
conflicted = "!${count}"
deleted = "-${count}"
diverged = "â‡•${count}"
format = '([($stashed )(ïپ„ ($untracked )($modified )($renamed )($deleted )($conflicted ))($staged )($ahead_behind )]($style))'
modified = "~${count}"
renamed = "آ»${count}"
staged = "ïپ† ${count}"
stashed = 'ïƒ‡ ${count}'
style = "bg:git_bg fg:light_fg"
untracked = "?${count}"

[git_state]
cherry_pick = "\uE29B"
format = '[$state ($progress_current/$progress_total )]($style)'
merge = "\uE727"
rebase = "\uE728"
revert = "\uF0E2"
style = "bg:git_bg fg:light_fg"

[time]
disabled = false
format = '[[ïگ؛ $time ](fg:light_fg bg:env_bg)]($style)'
style = "bg:time_bg"
time_format = "%R"

[line_break]
disabled = true

[palettes.default]
dark_fg = "#282828"
dir_bg = "cyan"
env_bg = "#3A3A3A"
git_bg = "#6F42C1"
id_bg = "#F96C2A"
light_fg = "#FFFFFF"
