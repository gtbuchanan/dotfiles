# Termux/Android-only mise global config.

# hk 1.48.0 defaults to an embedded pkl evaluator; on Termux its bundled
# rustls/reqwest client can't build without a system CA bundle and, even given
# one, hangs fetching the remote pkl package over HTTPS. Route pkl through the
# external CLI (installed + grun-wrapped out of band; see the `pkl` note under
# [settings]) instead. Scoped here because the embedded backend works fine on
# glibc Linux/CI — this config is android-only — so downstream repos stay
# platform-pure.
[env]
HK_PKL_BACKEND = "pkl"

# mise itself is packaged by Termux (installed via run_onchange_before.sh),
# but mise's tool-install backends don't have Android targets for these:
#
# node: `core:node` has no Android tarball and falls back to building
# from source, which doesn't compile cleanly against bionic. Use Termux's
# `nodejs-lts` package (installed in run_onchange_before.sh) instead —
# mise picks up system node via PATH when needed.
#
# pnpm: `aqua:pnpm/pnpm` lists linux/{x64,arm64}, darwin/arm64, windows —
# no android/arm64. Install via `npm i -g pnpm` instead (also in
# run_onchange_before.sh).
#
# hk: `aqua:jdx/hk` ships release tarballs for linux/darwin/windows only;
# its aqua manifest rejects android/arm64 ("unsupported env"). hk is a
# static musl aarch64 binary that runs unmodified on bionic, so install
# the release tarball directly (in run_onchange_after_install-hk.sh).
#
# pkl: `aqua:apple/pkl` has no android asset — it keys off `android` while
# only `pkl-linux-aarch64` exists. That binary is glibc-dynamic and needs
# the glibc-runner (`grun`) loader shim to run on bionic, so install it and
# a grun wrapper out of band (same run_onchange_after_install-hk.sh). hk
# only invokes pkl for validate/check/fix/install.
#
# actionlint: `aqua:rhysd/actionlint` has no android asset (only
# linux_arm64 exists). It's a static Go binary that runs unmodified on
# bionic, so the prebuilt linux_arm64 release is installed directly (in
# run_onchange_after_install-actionlint.sh). Unlike pkl it isn't an hk
# runtime dependency — hk just orchestrates it as a workflow-lint step.
#
# shellcheck / shfmt / ruff: `aqua` keys off android/arm64, for which these
# projects publish no asset (only linux/darwin/windows). Termux packages all
# three, native to bionic, so install them from `pkg` (run_onchange_before.sh)
# and let hk resolve them from PATH.
#
# clang-format (`pipx:clang-format`): the pipx/uv install path has no
# bionic-compatible wheel, and `uv` itself has no android asset. Termux's
# `clang` package supplies clang-format natively (same source), so `uv` is
# disabled too — clang-format was its only consumer here. clang-format then
# tracks Termux's clang release, which may lag a downstream project's pin.
[settings]
disable_tools = [
  "actionlint",
  "hk",
  "node",
  "pipx:clang-format",
  "pkl",
  "pnpm",
  "ruff",
  "shellcheck",
  "shfmt",
  "uv",
]
