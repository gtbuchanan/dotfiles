# Termux/Android-only mise global config.
#
# mise itself is packaged by Termux (installed via run_onchange_before.sh),
# but mise's tool-install backends don't have Android targets for these:
#
# node: `core:node` has no Android tarball and falls back to building
# from source, which doesn't compile cleanly against bionic. Use Termux's
# `nodejs-lts` package (installed in run_onchange_before.sh) instead —
# mise picks up system node via PATH when needed.
#
# pnpm: `aqua:pnpm/pnpm` lists linux/{x64,arm64}, darwin/arm64, windows —
# no android/arm64. Install via `npm i -g pnpm` instead (also in
# run_onchange_before.sh).
#
# hk: `aqua:jdx/hk` ships release tarballs for linux/darwin/windows only;
# its aqua manifest rejects android/arm64 ("unsupported env"). hk is a
# static musl aarch64 binary that runs unmodified on bionic, so install
# the release tarball directly (in run_onchange_after_install-hk.sh).
#
# pkl: `aqua:apple/pkl` has no android asset — it keys off `android` while
# only `pkl-linux-aarch64` exists. That binary is glibc-dynamic and needs
# the glibc-runner (`grun`) loader shim to run on bionic, so install it and
# a grun wrapper out of band (same run_onchange_after_install-hk.sh). hk
# only invokes pkl for validate/check/fix/install.
[settings]
disable_tools = ["node", "pnpm", "hk", "pkl"]
