# =============================================================================
# psmux-vim-navigator - Seamless navigation between Vim splits and psmux panes
# Port of christoomey/vim-tmux-navigator for psmux (Windows)
# =============================================================================
#
# vim-tmux-navigator's Unix plugin detects the pane's foreground process with
# `ps -o state= -o comm= -t #{pane_tty}`, which has no Windows equivalent.
# psmux instead resolves #{pane_current_command} to the pane's active
# descendant (e.g. `vim`, `nvim`, `pwsh`), so an `if-shell -F` format
# condition can branch with no per-keypress shell spawn.
#
# When Vim is the active process, C-h/j/k/l are forwarded into Vim: its
# vim-tmux-navigator plugin moves between splits and forwards back to psmux at
# a layout edge (via psmux's bundled `tmux` shim). Otherwise the keys switch
# psmux panes directly.
#
# psmux sources this file natively when it processes the plugin's
# `set -g @plugin` declaration, so no ppm/run entry point is required.
# =============================================================================

# Vim-detection condition, defined once and referenced via #{E:@is_vim} so the
# regex isn't repeated per binding. #{m/ri:...} is a case-insensitive regex
# match; the trailing (\.exe)? tolerates Windows executable names. Matches vim,
# gvim, nvim, view, vimdiff, and fzf. Override this option to customize.
set -g @is_vim '#{m/ri:^(g?(view|n?vim?x?)|fzf)(diff)?(\.exe)?$,#{pane_current_command}}'

# --- Vim-aware pane navigation (root table, no prefix) ---
bind-key -n C-h if-shell -F '#{E:@is_vim}' 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if-shell -F '#{E:@is_vim}' 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if-shell -F '#{E:@is_vim}' 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if-shell -F '#{E:@is_vim}' 'send-keys C-l' 'select-pane -R'
bind-key -n C-\\ if-shell -F '#{E:@is_vim}' 'send-keys C-\\' 'select-pane -l'

# Restore prefix + C-l to clear the screen (C-l is navigation above).
bind-key C-l send-keys 'C-l'

# --- copy-mode-vi: plain pane navigation (Vim is not active in copy mode) ---
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R
bind-key -T copy-mode-vi C-\\ select-pane -l
