[post-start]
# Bring a freshly-created worktree up to a usable state: mirror untracked
# *.local / *.user files from the primary worktree, carry over Visual Studio
# per-solution state, and run the project's `mise bootstrap` task (or
# `pnpm install` as fallback). Idempotent; safe to re-run.
bootstrap = "wt-bootstrap {{ "{{" }} worktree_path {{ "}}" }} {{ "{{" }} primary_worktree_path {{ "}}" }} {{ "{{" }} branch {{ "}}" }}"
