# Blocking so the worktree is usable the moment creation returns — notably,
# mise is trusted before post-start's `mise run` needs it.
pre-start = "wt-pre-start {{ "{{" }} worktree_path {{ "}}" }} {{ "{{" }} primary_worktree_path {{ "}}" }} {{ "{{" }} pr_number | default('') {{ "}}" }}"

# Backgrounded so the slow project setup doesn't block creation.
post-start = "wt-post-start {{ "{{" }} worktree_path {{ "}}" }}"
