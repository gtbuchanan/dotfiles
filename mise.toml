# Project tooling for developing this chezmoi repo. Deployed dotfiles live
# under `home/` (see .chezmoiroot); this file is repo-local dev config and is
# never applied by chezmoi. Mirrors gtbuchanan/tooling's mise.toml so local
# pre-commit runs match that repo's shared hk preset.

# Hard floor for minimum_release_age_excludes (below): older mise silently
# ignores the field instead of failing, so enforce the version rather than
# soft-warn.
min_version = "2026.6.2"

[env]
# hk wraps hook steps in `mise x` so mise-managed tools resolve without
# activation.
HK_MISE = "1"
# Route pkl through the external CLI (pinned in [tools]) instead of hk's
# embedded evaluator, whose leniency (it accepts redefining a spread-in
# Mapping member the CLI rejects) lets bad configs pass CI yet fail on the
# strict CLI Android must use. Pinning it repo-wide keeps local and CI
# evaluation identical.
HK_PKL_BACKEND = "pkl"

[hooks]
# Installs hk's git hooks (pre-commit) on `mise install`.
postinstall = "hk install --mise"

[settings]
# Required for the [hooks] table.
experimental = true
lockfile = true
# Matches the Renovate 3-day quarantine on fuzzy/`latest` resolution; the
# exact pins below install immediately.
minimum_release_age = "3d"
# Self-published packages never need the supply-chain quarantine — exclude
# them so fuzzy/`latest` resolution picks up our own just-cut releases.
minimum_release_age_excludes = ["npm:@gtbuchanan/*"]

# mise.tasks.toml is generated by `gtb sync mise`; this include is the one
# manual hookup (the verify-mise hk step checks it stays wired). mise-tasks/
# holds hand-authored file tasks (e.g. test:templates) alongside it.
[task_config]
includes = ["mise-tasks", "mise.tasks.toml"]

[tools]
actionlint = "1.7.12"
# Backs the hk render-templates step; also lets CI render templates without a
# separate chezmoi install.
chezmoi = "2.70.5"
hk = "1.48.0"
node = "24.18.0"
"npm:@gtbuchanan/cli" = "0.2.0"
"npm:renovate" = "43.231.2"
pkl = "0.31.1"
pnpm = "11.9.0"
# Backs the hk psscriptanalyzer step (and lint-powershell.ps1) so pwsh is pinned
# and reproducible on dev machines and CI rather than relying on an ambient one.
# The per-tool postinstall provisions the pinned PowerShell Gallery modules (see
# powershell-modules.psd1) once pwsh is installed; the script is idempotent, so
# it re-runs cheaply on reinstall. Bumping a module version in the manifest
# needs a `mise install --force powershell` (or a manual run) to re-provision.
powershell = { version = "7.6.3", postinstall = "pwsh -NoProfile -File scripts/provision-psmodules.ps1" }
shellcheck = "0.11.0"
shfmt = "3.13.1"
