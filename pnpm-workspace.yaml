allowBuilds:
  esbuild: true
  unrs-resolver: false

catalog:
  '@gtbuchanan/eslint-config': 0.2.0
  '@gtbuchanan/tsconfig': 0.1.1
  '@pnpm/types': 1101.4.0
  '@types/node': 26.1.1
  eslint: 10.7.0
  typescript: 6.0.3

catalogs:
  globals:
    # eslint-disable pnpm/yaml-no-unused-catalog-item -- consumed by the chezmoi pnpm-globals template, not a package.json
    '@bitwarden/cli': 2026.6.0
    '@openai/codex': 0.144.3
    '@playwright/cli': 0.1.17
    '@readonly-mcp/core': github:readonly-mcp/core#1ff05ccedbe3a589decdbd67e73f98a5884f3286
    '@vtsls/language-server': 0.3.0
    '@vue/language-server': 2.2.12
    tweakcc: 4.3.1
    vscode-langservers-extracted: 4.10.0
    # eslint-enable pnpm/yaml-no-unused-catalog-item

engineStrict: true

hoist: false

lockfileIncludeTarballUrl: false

# 4320 minutes = 3 days, matching the shared Renovate preset's quarantine.
minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - '@gtbuchanan/*'

strictPeerDependencies: true
