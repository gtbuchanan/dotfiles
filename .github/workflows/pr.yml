---
jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  pre-commit:
    name: Pre-Commit
    uses: gtbuchanan/tooling/.github/workflows/pre-commit.yml@main
    with:
      use-pnpm: true

name: PR

# The pull-request pipeline: diff-based pre-commit hooks plus the full CI
# template checks, both gating the merge.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
